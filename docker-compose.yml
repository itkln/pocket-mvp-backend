name: ${COMPOSE_PROJECT_NAME:-pocket-mvp}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pocket}
      POSTGRES_USER: ${POSTGRES_USER:-pocket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pocket_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.3
    entrypoint: ["/bin/sh", "-ec"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pocket}:${POSTGRES_PASSWORD:-pocket_local_password}@postgres:5432/${POSTGRES_DB:-pocket}?sslmode=disable
    command:
      - migrate -path=/migrations -database="$${DATABASE_URL}" up
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      args:
        VERSION: ${APP_VERSION:-dev}
        COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDRESS: :8080
      DATABASE_URL: postgres://${POSTGRES_USER:-pocket}:${POSTGRES_PASSWORD:-pocket_local_password}@postgres:5432/${POSTGRES_DB:-pocket}?sslmode=disable
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-15s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      DATA_LOOKUP_KEY: ${DATA_LOOKUP_KEY:-ZmVkY2JhOTg3NjU0MzIxMGZlZGNiYTk4NzY1NDMyMTA=}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-pocket_session}
      SESSION_TTL: ${SESSION_TTL:-720h}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    init: true
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    init: true
    restart: unless-stopped

volumes:
  postgres_data:
